<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Productos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:400px;
margin:auto;
background:silver;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>
<button onclick="irVentas()">Realizar ventas</button>
  
<button onclick="irProductos()" disabled>Registrar Producto</button>

<h2>Registro de Productos</h2>

<input id="codigo" placeholder="Codigo producto" onkeypress="detectarEnter(event)">
<br><br>

<input id="nombre" placeholder="Nombre producto">
<br><br>

<input id="precio" placeholder="Precio">
<br><br>

<input id="stock" placeholder="Stock">
<br><br>

<button onclick="guardar()">Guardar</button>

<button onclick="buscarProducto()">Buscar producto</button>

<button onclick="actualizar()">Actualizar producto</button>

<br><br>

<p id="mensaje"></p>

<script type="module">

import { db, collection, addDoc, getDocs, query, where, doc, updateDoc } from "./firebase.js"

let productoID = null

function mostrarMensaje(texto){

let mensaje = document.getElementById("mensaje")

mensaje.innerText = texto

setTimeout(function(){

mensaje.innerText = ""

},5000)

}

async function guardar(){

let codigo = document.getElementById("codigo").value
let nombre = document.getElementById("nombre").value
let precio = parseFloat(document.getElementById("precio").value)
let stock = parseInt(document.getElementById("stock").value)

await addDoc(collection(db,"productos"),{

codigo:codigo,
nombre:nombre,
precio:precio,
stock:stock

})

mostrarMensaje("Producto guardado")

}

async function buscarProducto(){

let codigo = document.getElementById("codigo").value

const q = query(
collection(db,"productos"),
where("codigo","==",codigo)
)

const datos = await getDocs(q)

if(datos.empty){

mostrarMensaje("Producto no encontrado")
return

}

datos.forEach((documento)=>{

let p = documento.data()

document.getElementById("nombre").value = p.nombre
document.getElementById("precio").value = p.precio
document.getElementById("stock").value = p.stock

productoID = documento.id

})

mostrarMensaje("Producto cargado")

}

async function actualizar(){

if(productoID === null){

mostrarMensaje("Primero busca un producto")
return

}

let codigo = document.getElementById("codigo").value
let nombre = document.getElementById("nombre").value
let precio = parseFloat(document.getElementById("precio").value)
let stock = parseInt(document.getElementById("stock").value)

await updateDoc(doc(db,"productos",productoID),{

codigo:codigo,
nombre:nombre,
precio:precio,
stock:stock

})

mostrarMensaje("Producto actualizado")

}

function detectarEnter(event){

if(event.key === "Enter"){

buscarProducto()

}

}

window.guardar = guardar
window.buscarProducto = buscarProducto
window.actualizar = actualizar
window.detectarEnter = detectarEnter

</script>

</body>
</html>
