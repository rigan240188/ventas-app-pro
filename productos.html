<!DOCTYPE html>
<html>

<head>

<title>Registrar productos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:400px;
margin:auto;
background:silver;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Registrar Producto</h2>

<button onclick="actualizar()">Actualizar producto</button>

<input id="codigo" placeholder="Codigo producto" onkeypress="detectarEnter(event)">

<input id="nombre" placeholder="Nombre producto">

<input id="precio" placeholder="Precio">

<input id="stock" placeholder="Stock">

<button onclick="guardar()">Guardar</button>

<p id="mensaje"></p>

</div>

<script type="module">

import { db, collection, addDoc } from "./firebase.js"

async function actualizar(){

let codigo = document.getElementById("codigo").value
let nombre = document.getElementById("nombre").value
let precio = parseFloat(document.getElementById("precio").value)
let stock = parseInt(document.getElementById("stock").value)

await updateDoc(doc(db,"productos",productoID),{

codigo:codigo,
nombre:nombre,
precio:precio,
stock:stock

})

alert("Producto actualizado")

}

window.actualizar = actualizar

function detectarEnter(event){

if(event.key === "Enter"){

buscarProducto()

}

}

window.detectarEnter = detectarEnter

async function buscarProducto(){

let codigo = document.getElementById("codigo").value

const q = query(
collection(db,"productos"),
where("codigo","==",codigo)
)

const datos = await getDocs(q)

if(datos.empty){

alert("Producto no encontrado")
return

}

datos.forEach((documento)=>{

let p = documento.data()

document.getElementById("nombre").value = p.nombre
document.getElementById("precio").value = p.precio
document.getElementById("stock").value = p.stock

productoID = documento.id

})

}
async function guardar(){

let codigo = document.getElementById("codigo").value
let nombre = document.getElementById("nombre").value
let precio = parseFloat(document.getElementById("precio").value)
let stock = parseInt(document.getElementById("stock").value)

await addDoc(collection(db,"productos"),{

codigo:codigo,
nombre:nombre,
precio:precio,
stock:stock

})

let mensaje = document.getElementById("mensaje")

mensaje.innerText = "Producto guardado correctamente"

setTimeout(function(){

mensaje.innerText = ""

},5000)

}

window.guardar = guardar

</script>

</body>
</html>
