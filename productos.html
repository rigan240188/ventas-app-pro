<!DOCTYPE html>
<html>

<head>

<title>Registrar productos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Registrar Producto</h2>

<input id="codigo" placeholder="Codigo producto">

<input id="nombre" placeholder="Nombre producto">

<input id="precio" placeholder="Precio">

<input id="stock" placeholder="Stock">

<button onclick="guardar()">Guardar</button>

<p id="mensaje"></p>

</div>

<script type="module">

import { db, collection, addDoc } from "./firebase.js"

async function guardar(){

let codigo = document.getElementById("codigo").value
let nombre = document.getElementById("nombre").value
let precio = parseFloat(document.getElementById("precio").value)
let stock = parseInt(document.getElementById("stock").value)

await addDoc(collection(db,"productos"),{

codigo:codigo,
nombre:nombre,
precio:precio,
stock:stock

})

let mensaje = document.getElementById("mensaje")

mensaje.innerText = "Producto guardado correctamente"

setTimeout(function(){

mensaje.innerText = ""

},5000)

}

window.guardar = guardar

</script>

</body>
</html>
